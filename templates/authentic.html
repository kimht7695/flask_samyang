{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>정품입니다</h2>
  <p>최초 1회 스캔으로 확인되었습니다.</p>
  <p><span class="badge ok">정품 인증 성공</span></p>
  <p>QR명: <strong>{{ qr.name }}</strong></p>
  <p class="mono">연결 URL: {{ qr.target_url }}</p>
  <p><a class="btn" href="{{ qr.target_url }}" target="_blank">원본 페이지 이동</a></p>
  <p class="muted">위치 권한을 허용하면 통계 페이지에 스캔 위치 좌표도 기록됩니다.</p>
</div>
<script>
(function(){
  const logId = {{ latest_log_id }};
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(pos){
    fetch(`/api/scan-log/${logId}/location`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({latitude: pos.coords.latitude, longitude: pos.coords.longitude, location_note:'browser-geolocation'})
    });
  }, function(){}, {enableHighAccuracy:true, timeout:5000, maximumAge:0});
})();
</script>
{% endblock %}
