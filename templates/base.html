<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'QR 정품/가품 판별 시스템' }}</title>
  <style>
    body{font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f3f6fb;color:#1f2937;margin:0}
    .wrap{max-width:1120px;margin:24px auto;padding:0 16px}
    .card{background:#fff;border:1px solid #d7deea;border-radius:20px;padding:24px;margin-bottom:20px}
    h1,h2,h3{margin:0 0 14px 0;color:#0f172a}
    p{line-height:1.6;color:#475569}
    a{color:#2563eb;text-decoration:none}
    .nav a{margin-right:14px;font-weight:700}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px}
    .btn{display:inline-block;background:#2563eb;color:#fff;padding:12px 18px;border-radius:12px;font-weight:700;border:none;cursor:pointer}
    .btn.secondary{background:#e2e8f0;color:#0f172a}
    input[type=text],input[type=url]{width:100%;padding:14px;border:1px solid #cbd5e1;border-radius:12px;box-sizing:border-box;font-size:16px}
    label{display:block;font-weight:700;margin:14px 0 8px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px 10px;border-bottom:1px solid #e5e7eb;text-align:left;vertical-align:top}
    th{background:#f8fafc;color:#334155}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:13px;font-weight:700}
    .badge.ok{background:#dcfce7;color:#166534}
    .badge.warn{background:#ffedd5;color:#c2410c}
    .muted{color:#64748b;font-size:14px}
    .kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .kpi .box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:16px}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all}
    .right{display:flex;gap:8px;flex-wrap:wrap}
    .flash{padding:14px 16px;border-radius:12px;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;margin-bottom:14px}
    @media (max-width: 900px){.grid,.kpi{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>QR 정품/가품 판별 시연 시스템</h1>
      <p>QR코드 안에 특정 URL과 난수 파라미터를 저장하고, 최초 1회 스캔은 정품 페이지, 2회차부터는 가품 의심 페이지를 표시하는 Flask 기반 데모입니다.</p>
      <div class="nav">
        <a href="{{ url_for('admin') }}">관리자</a>
        <a href="{{ url_for('history') }}">이력 조회</a>
        <a href="{{ url_for('stats_index') }}">통계</a>
      </div>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
